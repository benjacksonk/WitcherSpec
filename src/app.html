<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="stylesheet" href="">
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>



<style>
	:root, html, body, *, *::before, *::after {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
	}

	:root {
		--pad: 0.79cap;
		--phi: calc(sqrt(5 / 4) + 1 / 2);
		--hpower: calc(log(pow(var(--phi), 1 / 3)));
		--h1-size: calc(1rem * exp(var(--hpower) * 4));
		--h2-size: calc(1rem * exp(var(--hpower) * 3));
		--h3-size: calc(1rem * exp(var(--hpower) * 2));
		--h4-size: calc(1rem * exp(var(--hpower)));
		--h5-size: 1rem;
		--h6-size: calc(1rem * exp(var(--hpower) * -1));
		--font: 'Comme', 'Radio Canada', sans-serif;
		--h-font: 'Foreday Semi Sans', 'Noto Serif', 'Droid Serif', 'Open Serif', 'Roboto Slab', var(--font), serif;
		--color-grey-mid: #777;
		--color-grey: #a6a6a6;
	}

	html {
		font-size: 10pt;
	}
	
	* {
		font-family: var(--font);
	}

	body {
		font-size: 1rem;
        /* width: 100%; */
        /* height: 100%; */
		/* overflow: clip; */
	}

	p, span, button {
		font-size: 1rem;
	}
	h1 { font-weight: 600; font-size: var(--h1-size); }
	h2 { font-weight: 550; font-size: var(--h2-size); }
	h3 { font-weight: 500; font-size: var(--h3-size); }
	h4 { font-weight: 500; font-size: var(--h4-size); }
	h5 { font-weight: 500; font-size: var(--h5-size); }
	h6 { font-weight: 500; font-size: var(--h6-size); }
	h1, h2, h3, h4, h5, h6 { font-family: var(--h-font); }

	button {
		--radius: calc(var(--pad) + ((1lh - var(--pad)) / 4));
		padding: var(--pad);
		border-radius: var(--radius);
		width: fit-content;
		height: fit-content;
		display: flex;
		
		&:not([disabled]) {
			cursor: pointer;
		}

		&[interestfor] {
			interest-delay: 0s;
		}
	}

	img {
		max-width: 100%;
		max-height: 100%;
		object-fit: contain;
		display: block;
	}
	p img, span img { display: inline-block; }

	.hidden { visibility: hidden !important; }
	.removed { display: none !important; }

	.plain {
		margin: 0;
		padding: 0;
		border-radius: 0;
		border: none;
		background: none;
	}

	*[popover] {
		position-area: bottom;
		position-try-fallbacks: top;
	}
	*[popover="hint"] {
		pointer-events: none;
	}
</style>
