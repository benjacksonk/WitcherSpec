	html {
		font-size: 10pt;
	}
	
	* {
		font-family: var(--font);
	}

	body {
		font-size: 1rem;
        /* width: 100%; */
        /* height: 100%; */
		/* overflow: clip; */
	}

	p, span, button {
		font-size: 1rem;
	}
	h1 { font-weight: 600; font-size: var(--h1-size); }
	h2 { font-weight: 550; font-size: var(--h2-size); }
	h3 { font-weight: 500; font-size: var(--h3-size); }
	h4 { font-weight: 500; font-size: var(--h4-size); }
	h5 { font-weight: 500; font-size: var(--h5-size); }
	h6 { font-weight: 500; font-size: var(--h6-size); }
	h1, h2, h3, h4, h5, h6 { font-family: var(--h-font); }

	button {
		--radius: calc(var(--pad) + ((1lh - var(--pad)) / 4));
		padding: var(--pad);
		border-radius: var(--radius);
		width: fit-content;
		height: fit-content;
		display: flex;
		
		&:not([disabled]) {
			cursor: pointer;
		}

		&[interestfor] {
			interest-delay: 0s;
		}
	}

	img {
		max-width: 100%;
		max-height: 100%;
		object-fit: contain;
		display: block;
	}
	p img, span img { display: inline-block; }

	.hidden { visibility: hidden !important; }
	.removed { display: none !important; }

	.plain {
		margin: 0;
		padding: 0;
		border-radius: 0;
		border: none;
		background: none;
	}

		filter: drop-shadow(0px 1px 1px var(--color-key-9));
